version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src/api:/app/src/api
      - ./migrations:/app/migrations
    restart: unless-stopped

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped
